<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Little Pink House &mdash; A Choose Your Own Adventure</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0c0c0f;--bg2:#151519;--bg3:#1c1c22;
--border:#2a2a33;--border-h:#3a3a48;
--text:#e2e0d8;--text2:#9a988e;--text3:#5e5d57;
--pink:#e8456c;--pink2:#ff6b8a;--pink-bg:rgba(232,69,108,.08);
--amber:#d4a041;--amber-bg:rgba(212,160,65,.08);
--green:#4a9;--green-bg:rgba(68,170,153,.08);
--red:#d45;--red-bg:rgba(221,68,85,.08);
--purple:#9a7bd4;--purple-bg:rgba(154,123,212,.08);
--mono:'JetBrains Mono',monospace;
--sans:'DM Sans',sans-serif;
}
html,body{height:100%}
body{
background:
radial-gradient(ellipse 80% 60% at 50% 0%,rgba(232,69,108,.08),transparent 70%),
radial-gradient(ellipse 60% 40% at 50% 100%,rgba(154,123,212,.05),transparent 70%),
var(--bg);
color:var(--text);font-family:var(--mono);
min-height:100vh;display:flex;flex-direction:column;
overflow-x:hidden;
}
.topbar{
display:flex;align-items:center;justify-content:space-between;
padding:18px 28px;border-bottom:1px solid var(--border);
position:sticky;top:0;background:rgba(12,12,15,.85);
backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:20;
}
.brand{font-family:var(--sans);font-size:14px;font-weight:700;letter-spacing:.01em}
.brand span{color:var(--pink)}
.brand .sub{display:block;font-family:var(--mono);font-size:9px;font-weight:400;color:var(--text3);letter-spacing:.15em;text-transform:uppercase;margin-top:2px}
.topbar-right{display:flex;align-items:center;gap:10px}
.pill{
font-size:10px;color:var(--text3);
background:var(--bg2);border:1px solid var(--border);
border-radius:20px;padding:6px 12px;letter-spacing:.08em;text-transform:uppercase;
}
.pill b{color:var(--text2);font-weight:600}
.back-btn{
background:var(--bg2);border:1px solid var(--border);border-radius:8px;
padding:8px 14px;font-family:var(--mono);font-size:11px;color:var(--text2);
cursor:pointer;transition:all .2s;letter-spacing:.05em;
}
.back-btn:hover:not(:disabled){border-color:var(--pink);color:var(--pink)}
.back-btn:disabled{opacity:.3;cursor:not-allowed}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px 60px}
.stage{width:100%;max-width:720px;position:relative}
.scene{
position:relative;
opacity:0;transform:translateY(12px);
transition:opacity .45s ease,transform .45s ease;
}
.scene.in{opacity:1;transform:translateY(0)}
.scene.out{opacity:0;transform:translateY(-12px);transition:opacity .25s ease,transform .25s ease}
.step-label{
font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);
margin-bottom:16px;display:flex;align-items:center;gap:10px;
}
.step-label::before{
content:'';display:inline-block;width:24px;height:1px;background:var(--pink);
}
.scene-title{
font-family:var(--sans);font-size:34px;font-weight:700;line-height:1.15;
margin-bottom:22px;letter-spacing:-.01em;
}
.scene-title .accent{color:var(--pink)}
.scene-text{
font-family:var(--sans);font-size:17px;line-height:1.65;color:var(--text2);
margin-bottom:38px;max-width:640px;
}
.choices{display:flex;flex-direction:column;gap:12px;margin-top:8px}
.choice{
display:flex;align-items:flex-start;gap:14px;text-align:left;
background:var(--bg2);border:1px solid var(--border);border-radius:12px;
padding:18px 22px;font-family:var(--mono);color:var(--text);cursor:pointer;
transition:all .25s ease;width:100%;
}
.choice:hover{
border-color:var(--pink);background:var(--pink-bg);
transform:translateX(4px);
}
.choice:hover .choice-arrow{color:var(--pink);transform:translateX(3px)}
.choice-letter{
font-size:11px;font-weight:600;letter-spacing:.12em;color:var(--text3);
background:var(--bg3);border:1px solid var(--border);border-radius:6px;
padding:4px 8px;margin-top:1px;flex-shrink:0;
}
.choice:hover .choice-letter{color:var(--pink);border-color:var(--pink)}
.choice-label{
flex:1;font-family:var(--sans);font-size:15px;font-weight:500;line-height:1.4;
}
.choice-arrow{font-size:16px;color:var(--text3);transition:all .25s;margin-top:1px}
.ending-card{
border:1px solid var(--border);border-radius:14px;padding:34px 32px;
background:var(--bg2);margin-top:10px;position:relative;overflow:hidden;
}
.ending-card::before{
content:'';position:absolute;top:0;left:0;right:0;height:3px;
background:var(--pink);
}
.ending-card.good::before{background:var(--green)}
.ending-card.good{background:linear-gradient(180deg,var(--green-bg),var(--bg2) 60%)}
.ending-card.great::before{background:var(--purple)}
.ending-card.great{background:linear-gradient(180deg,var(--purple-bg),var(--bg2) 60%)}
.ending-card.mixed::before{background:var(--amber)}
.ending-card.mixed{background:linear-gradient(180deg,var(--amber-bg),var(--bg2) 60%)}
.ending-card.bad::before{background:var(--red)}
.ending-card.bad{background:linear-gradient(180deg,var(--red-bg),var(--bg2) 60%)}
.ending-type{
font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--text3);
margin-bottom:10px;
}
.ending-card.good .ending-type{color:var(--green)}
.ending-card.great .ending-type{color:var(--purple)}
.ending-card.mixed .ending-type{color:var(--amber)}
.ending-card.bad .ending-type{color:var(--red)}
.ending-name{
font-family:var(--sans);font-size:30px;font-weight:700;line-height:1.15;
margin-bottom:18px;letter-spacing:-.01em;
}
.ending-text{
font-family:var(--sans);font-size:16px;line-height:1.65;color:var(--text2);
margin-bottom:26px;
}
.ending-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.action{
background:var(--bg3);border:1px solid var(--border);border-radius:8px;
padding:11px 20px;font-family:var(--mono);font-size:12px;color:var(--text);
cursor:pointer;transition:all .2s;letter-spacing:.05em;
}
.action:hover{border-color:var(--pink);color:var(--pink)}
.action.primary{background:var(--pink);border-color:var(--pink);color:#0c0c0f;font-weight:600}
.action.primary:hover{background:var(--pink2);border-color:var(--pink2);color:#0c0c0f}
.path-trail{
margin-top:48px;padding-top:22px;border-top:1px dashed var(--border);
font-size:10px;color:var(--text3);letter-spacing:.05em;line-height:1.7;
}
.path-trail b{color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.15em;font-size:9px;display:block;margin-bottom:8px}
.path-trail .crumb{display:inline-block;margin-right:6px}
.path-trail .crumb + .crumb::before{content:'\203A';margin-right:6px;color:var(--text3)}
.legend-bar{
display:flex;justify-content:center;gap:18px;padding:14px 24px;
border-top:1px solid var(--border);background:var(--bg2);flex-wrap:wrap;
}
.legend-item{display:flex;align-items:center;gap:6px;font-size:9px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase}
.legend-dot{width:8px;height:8px;border-radius:2px}
@media (max-width:640px){
.topbar{padding:14px 18px}
.brand{font-size:12px}
.scene-title{font-size:26px}
.scene-text{font-size:15px}
.ending-name{font-size:24px}
.ending-card{padding:26px 22px}
.choice{padding:16px 18px}
.choice-label{font-size:14px}
main{padding:28px 18px 40px}
.legend-bar{gap:10px;padding:12px 14px}
}
</style>
</head>
<body>
<div class="topbar">
<div class="brand">The Little <span>Pink</span> House<span class="sub">Choose Your Own Adventure</span></div>
<div class="topbar-right">
<div class="pill" id="progressPill">Scene <b id="depthNum">1</b></div>
<button class="back-btn" id="backBtn" onclick="goBack()">&larr; Back</button>
</div>
</div>
<main>
<div class="stage" id="stage"></div>
</main>
<div class="legend-bar">
<div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div>Great ending</div>
<div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Good ending</div>
<div class="legend-item"><div class="legend-dot" style="background:var(--amber)"></div>Mixed ending</div>
<div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>Bad ending</div>
<div class="legend-item" style="color:var(--text2)">16 possible endings</div>
</div>
<script>
const tree={
id:'start',step:'Scene 1',title:'Eminent domain notice arrives',
text:'A letter from the city informs you that your little pink house sits in a "redevelopment zone" and will be seized under eminent domain for a private development project. The Fifth Amendment requires "just compensation," but the government\u2019s opening offer is far below market value. Your home, your memories, and your neighborhood are all at stake \u2014 and you have limited time to respond.',
children:[
{id:'negotiate',step:'Choice A',title:'Negotiate alone',
text:'You sit across the table from government agents and a team of city attorneys, trying to argue for a fair price without any legal representation of your own. The power imbalance is enormous \u2014 they have appraisers, lawyers, and the full weight of the state behind them. They raise the offer slightly but make it clear this is their final number, and the condemnation will proceed regardless.',
children:[
{id:'accept',step:'Choice A',title:'Accept the low offer',
ending:{type:'bad',name:'Underpaid',text:'You sign away your home for a fraction of its real value, pressured by the fear that fighting could leave you with even less. The government\u2019s appraisal ignored your home\u2019s sentimental value and the cost of relocating your life. Within months, bulldozers flatten the little pink house and the developer breaks ground on luxury condos where your kitchen used to be. Your neighbors who held out longer ended up getting significantly more money.'}},
{id:'fight_solo',step:'Choice B',title:'Refuse \u2014 fight back alone',
text:'No lawyer, no money, but you refuse to give up your home without a real fight. Fighting eminent domain without legal counsel is risky \u2014 the procedural rules are complex, deadlines are strict, and one missed filing could end your case. You know you need the public on your side to have any chance of shifting the political calculus.',
children:[
{id:'media_solo',step:'Choice A',title:'Take your story to the media',
text:'A local reporter picks up your story and runs a front-page feature on the little pink house. The article sparks outrage \u2014 readers are shocked that the government can take a private home and hand the land to a developer. Social media amplifies the coverage, and suddenly city council members are fielding angry phone calls. The political pressure is building, but the legal process hasn\u2019t stopped.',
children:[
{id:'rally',step:'Choice A',title:'Rally neighbors to fight the blight hearing',
text:'The city must declare your neighborhood "blighted" before it can justify the taking, so you organize your neighbors to fight back at the public hearing. You pack the hearing room with supporters carrying photos of well-maintained homes, tax receipts, and evidence that the "blight" designation is a pretext. Despite the overwhelming testimony, the council votes to approve the blight finding anyway \u2014 the developer\u2019s lobbyists were more persuasive behind closed doors.',
children:[
{id:'blight_win',step:'Choice A',title:'Challenge the designation in court',
ending:{type:'good',name:'Home saved',text:'Your attorney challenges the blight finding in court, arguing it was arbitrary and unsupported by evidence. The judge agrees \u2014 the neighborhood doesn\u2019t meet the statutory definition of "blighted," and the city\u2019s process was riddled with conflicts of interest. Without a valid blight designation, the city can\u2019t justify the taking under state law. The little pink house stands, and you sit on your porch watching the sunset, same as always.'}},
{id:'blight_lose',step:'Choice B',title:'Lose the challenge \u2014 condemnation proceeds',
text:'The court upholds the blight finding, ruling that the city\u2019s determination is entitled to broad deference under state law. With the legal challenge lost, the condemnation moves forward and your home will be taken. A panel of three commissioners is appointed to determine "just compensation" \u2014 the only question left is how much they\u2019ll pay you for the home you never wanted to sell.',
children:[
{id:'settle1',step:'Choice A',title:'Accept the commissioners\' award',
ending:{type:'mixed',name:'The pragmatist',text:'You take the commissioners\u2019 award and walk away. It\u2019s more than the government\u2019s first offer, but still below what a willing buyer would have paid on the open market \u2014 "just compensation" rarely accounts for the true cost of forced displacement. You use the money to find a new place and start over, though it takes years to feel at home again. The little pink house becomes a parking garage for the new condo development.'}},
{id:'jury1',step:'Choice B',title:'Demand a jury trial',
ending:{type:'good',name:'The fighter',text:'You exercise your constitutional right to a jury trial on the question of just compensation. Your attorney presents comparable sales, relocation costs, and testimony about what the home meant to you and the neighborhood. The jury awards you 4x the government\u2019s initial offer, sending a clear message that lowball tactics won\u2019t go unchallenged. Your story runs in the national papers, and other homeowners facing eminent domain reach out for advice.'}}
]}
]},
{id:'referendum',step:'Choice B',title:'Push for a ballot referendum instead',
ending:{type:'mixed',name:'The reformer',text:'You channel the public outrage into a petition drive for a ballot referendum restricting eminent domain for private development. Volunteers gather signatures outside grocery stores and at community events, and the measure qualifies for the ballot. The referendum passes with 68% of the vote \u2014 but the new law can\u2019t be applied retroactively to save your home. The pink house is demolished, but future homeowners in your state now have constitutional protections you helped create.'}}
]},
{id:'retaliate',step:'Choice B',title:'City retaliates \u2014 fast-tracks your case',
text:'The city doesn\u2019t appreciate the negative press coverage and responds by accelerating the condemnation timeline against you specifically. Without a lawyer, you struggle to keep up with the flurry of legal filings, court dates, and procedural deadlines. Code enforcement officers suddenly appear to cite your property for minor violations they\u2019d ignored for years. The message is clear: fighting back has consequences.',
children:[
{id:'cave',step:'Choice A',title:'Give up under pressure',
ending:{type:'bad',name:'Pressured out',text:'The legal threats, the impossible deadlines, the code violations, the isolation \u2014 it all becomes too much. You sign the papers under duress for barely more than the original offer, exhausted and broken by the bureaucratic machinery arrayed against you. You watch from across the street as they demolish your home, knowing you were bullied out of a fair fight. The experience leaves you distrustful of government and convinced the system is rigged against ordinary people.'}},
{id:'probono',step:'Choice B',title:'A pro-bono lawyer takes your case',
text:'A civil liberties attorney from a nonprofit legal organization sees your story in the news and offers to represent you for free. Property rights cases like yours are exactly the kind of David-vs-Goliath fights these organizations exist to take on. Your lawyer immediately files motions to slow the accelerated timeline and challenges the retaliatory code violations. It\u2019s finally a fair fight \u2014 but the taking itself has already been approved, so the battle now is over compensation.',
children:[
{id:'settle2',step:'Choice A',title:'Settle for the revised offer',
ending:{type:'mixed',name:'The pragmatist',text:'Your lawyer negotiates a settlement significantly higher than the original offer by documenting the city\u2019s retaliatory tactics and threatening to take the case public. The revised number covers your relocation costs and gives you a down payment on a comparable home. It\u2019s not what the home was truly worth to you \u2014 decades of memories can\u2019t be appraised \u2014 but it\u2019s enough to move forward. You take the money and close this chapter of your life.'}},
{id:'jury2',step:'Choice B',title:'Push for a jury trial',
ending:{type:'good',name:'The fighter',text:'Your attorney presents the full timeline to the jury: the lowball offer, the media coverage, the retaliatory code violations, the fast-tracked condemnation. The jury sees through the city\u2019s tactics and is visibly angry at the abuse of power. They award you far more than the commissioners\u2019 figure \u2014 enough to buy a nicer home and still have money left over. You leave the courtroom with your head high, knowing you made the city pay for playing dirty.'}}
]}
]}
]}
]},
{id:'attorney',step:'Choice B',title:'Hire an eminent domain attorney',
text:'You hire a specialized eminent domain attorney who immediately files a Freedom of Information Act request with the city. The FOIA documents reveal what the city tried to hide: a private developer had been promised your land months before the "public use" justification was even drafted. Internal emails show city officials coordinating with the developer\u2019s lobbyists to target your neighborhood specifically. Now you have real ammunition for a legal fight.',
children:[
{id:'coalition',step:'Choice A',title:'Build a coalition + media blitz',
text:'Armed with the FOIA evidence, you launch a full-scale grassroots campaign. You go door-to-door organizing neighbors, hold protests outside City Hall, and write Op-Eds for the local paper exposing the backroom deal. Sympathetic council members start breaking ranks, and the mayor\u2019s approval ratings take a hit. Your fight has become a political headache that city leadership can no longer ignore.',
children:[
{id:'court_challenge',step:'Choice A',title:'Challenge the lawsuit in court',
text:'Your attorney files a motion to dismiss the condemnation, arguing the city failed to follow its own procedures: required public hearings were skipped, environmental impact studies were never completed, and the "necessity" determination was predetermined before any analysis. Due process under the Fourteenth Amendment requires that government follow fair procedures before taking property. The judge agrees to hear oral arguments.',
children:[
{id:'court_win',step:'Choice A',title:'Win on procedural grounds',
ending:{type:'good',name:'Victory \u2014 case dismissed',text:'The court finds that the city cut corners at every stage: improper public notice, missing environmental impact studies, and predetermined outcomes that violated due process. The judge rules the condemnation proceedings void and dismisses the case entirely. The developers are forced to go back to the drawing board, and several city officials face ethics investigations based on the FOIA evidence. Your little pink house stands, and the neighborhood organizes a block party to celebrate.'}},
{id:'court_lose',step:'Choice B',title:'Judge defers to the city',
text:'The judge acknowledges procedural irregularities but rules they weren\u2019t severe enough to invalidate the taking, deferring to the city\u2019s broad discretion in redevelopment matters. The condemnation is upheld, and the case moves to the valuation phase where three appointed commissioners will determine fair market value. Your coalition\u2019s public pressure means the commissioners can\u2019t easily lowball you \u2014 the whole city is watching what they decide.',
children:[
{id:'settle3',step:'Choice A',title:'Accept the commissioners\' award',
ending:{type:'mixed',name:'The pragmatist',text:'The commissioners\u2019 award, influenced by your coalition\u2019s public pressure and your attorney\u2019s detailed appraisal, comes in well above the original offer. You accept the money, donate a portion to the neighborhood action group to continue the fight for others, and find a new home in the next town. The coalition you built continues operating long after you leave, successfully blocking two more attempted takings in the same neighborhood.'}},
{id:'jury3',step:'Choice B',title:'Demand a jury trial',
ending:{type:'good',name:'The fighter',text:'Your coalition fills the courtroom gallery for every day of the trial, and the media covers each session. Your attorney presents the FOIA evidence, comparable property sales, and expert testimony on the true value of your home and the community it anchored. The jury awards you 5x the initial offer \u2014 the largest eminent domain compensation verdict in the state\u2019s history. National news picks up the story, and your case becomes a rallying point for property rights reform across the country.'}}
]}
]},
{id:'ij',step:'Choice B',title:'Get the Institute for Justice involved',
text:'The Institute for Justice, a national nonprofit that litigates property rights cases, agrees to take your case pro bono. They see it as a potential test case that could reshape eminent domain law across the entire state. Their legal team has argued before state supreme courts and even the U.S. Supreme Court. With their resources and expertise, your little pink house becomes the center of a constitutional battle over the meaning of "public use."',
children:[
{id:'landmark',step:'Choice A',title:'Win the landmark case',
ending:{type:'great',name:'Landmark victory',text:'The state supreme court rules that transferring private property to another private party for economic development does not qualify as "public use" under the state constitution. The decision overturns decades of permissive precedent and establishes a strict standard: the government can only take property for genuinely public purposes like roads, schools, or utilities. Your case becomes a textbook example studied in law schools nationwide. The little pink house becomes a symbol of property rights, and your name is forever linked to the protection of homeowners against government overreach.'}},
{id:'movement',step:'Choice B',title:'Lose \u2014 but the nation watches',
ending:{type:'mixed',name:'The movement',text:'The state supreme court rules against you, holding that economic development and increased tax revenue qualify as "public use" \u2014 a devastating legal loss. But the Institute for Justice turns your defeat into a national campaign, running ads, publishing reports, and lobbying state legislatures across the country. Within five years, 43 states pass eminent domain reform laws restricting takings for private development. Your little pink house is gone, but the movement it sparked protects millions of homeowners from the same fate.'}}
]}
]},
{id:'direct_court',step:'Choice B',title:'Skip the politics \u2014 go straight to court',
text:'Rather than building a public campaign, your attorney goes straight to the courthouse with the FOIA evidence. The legal argument is straightforward: the Fifth Amendment\u2019s "public use" requirement means the government can only take property for genuinely public purposes, not to hand it to a private developer for luxury condos. The FOIA documents prove this was never about public benefit \u2014 it was a sweetheart deal from the start.',
children:[
{id:'pu_win',step:'Choice A',title:'"Public use" challenge succeeds',
ending:{type:'great',name:'Taking blocked',text:'The court agrees that transferring your land to a private developer for luxury condominiums does not satisfy the constitutional requirement of "public use." The judge writes that increased tax revenue and speculative economic benefits are not enough to justify stripping a citizen of their home. The taking is permanently blocked, and the developer\u2019s appeal to the state supreme court fails. You plant new flowers in front of your little pink house, knowing it\u2019s finally safe.'}},
{id:'pu_lose',step:'Choice B',title:'Court upholds broad "public use"',
text:'The court adopts a broad interpretation of "public use," ruling that the anticipated increase in tax revenue and job creation from the development qualifies as a legitimate "public benefit" under current precedent. This expansive reading means almost any private development can be justified as serving the public interest. The taking stands, and the only remaining question is the price \u2014 your attorney vows to make the city pay every dollar your home is worth.',
children:[
{id:'settle4',step:'Choice A',title:'Settle and move on',
ending:{type:'mixed',name:'The pragmatist',text:'Your attorney negotiates the best deal possible, using the FOIA evidence as leverage to push the settlement well above the commissioners\u2019 initial figure. You take the check and buy a place in the next town over, but it never quite feels like home. On quiet evenings you sometimes drive past where the little pink house used to stand, now a concrete foundation for someone else\u2019s investment property. The experience changes how you think about property rights and the limits of government power.'}},
{id:'jury4',step:'Choice B',title:'Take it to a jury',
ending:{type:'good',name:'The fighter',text:'Your attorney presents the FOIA evidence to the jury in devastating detail: the secret meetings, the backroom promises, the predetermined outcome disguised as public planning. Jurors are visibly furious as they review internal emails between city officials and the developer\u2019s lobbyists. They award you massive compensation \u2014 a financial reckoning for the city\u2019s greed and dishonesty. You lost your home, but you made them pay dearly for it, and the verdict sends a warning to every city that tries the same thing.'}}
]}
]}
]}
]};

// Build a flat lookup from id -> node (with parent reference) for back navigation and path display.
const nodes={};
(function walk(node,parent){
node.parent=parent||null;
nodes[node.id]=node;
if(node.children) node.children.forEach(function(c){walk(c,node)});
})(tree);

let history=['start'];
const stage=document.getElementById('stage');
const backBtn=document.getElementById('backBtn');
const depthNum=document.getElementById('depthNum');

function escapeHtml(s){
return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlightTitle(t){
// Wrap "Pink" in accent span if present (only on start scene title)
return escapeHtml(t).replace(/Pink/g,'<span class="accent">Pink</span>');
}

function renderScene(id,direction){
const node=nodes[id];
const prev=stage.querySelector('.scene');
const scene=document.createElement('div');
scene.className='scene';
let html='';
const isStart=(id==='start');
const stepText=isStart?'Scene 01 \u2014 The beginning':node.step;
html+='<div class="step-label">'+escapeHtml(stepText)+'</div>';

if(node.ending){
const e=node.ending;
html+='<div class="ending-card '+e.type+'">';
html+='<div class="ending-type">'+({good:'Good ending',great:'Great ending',mixed:'Mixed ending',bad:'Bad ending'})[e.type]+'</div>';
html+='<div class="ending-name">'+escapeHtml(e.name)+'</div>';
html+='<div class="ending-text">'+escapeHtml(e.text)+'</div>';
html+='<div class="ending-actions">';
html+='<button class="action primary" onclick="restart()">&#x21BB; Start over</button>';
html+='<button class="action" onclick="goBack()">&larr; Try a different choice</button>';
html+='</div>';
html+='</div>';
}else{
html+='<div class="scene-title">'+highlightTitle(node.title)+'</div>';
if(node.text) html+='<div class="scene-text">'+escapeHtml(node.text)+'</div>';
if(node.children&&node.children.length){
html+='<div class="choices">';
node.children.forEach(function(c,i){
const letter=String.fromCharCode(65+i);
html+='<button class="choice" data-id="'+c.id+'">';
html+='<div class="choice-letter">'+letter+'</div>';
html+='<div class="choice-label">'+escapeHtml(c.title)+'</div>';
html+='<div class="choice-arrow">&rarr;</div>';
html+='</button>';
});
html+='</div>';
}
}

// Path trail (breadcrumb of choices made so far)
if(history.length>1){
html+='<div class="path-trail"><b>Your path so far</b>';
history.forEach(function(hid,i){
if(i===0) return;
const hn=nodes[hid];
html+='<span class="crumb">'+escapeHtml(hn.title)+'</span>';
});
html+='</div>';
}

scene.innerHTML=html;

if(prev){
prev.classList.remove('in');
prev.classList.add('out');
setTimeout(function(){
if(prev.parentNode) prev.parentNode.removeChild(prev);
stage.appendChild(scene);
requestAnimationFrame(function(){scene.classList.add('in')});
attachHandlers(scene);
},250);
}else{
stage.appendChild(scene);
requestAnimationFrame(function(){scene.classList.add('in')});
attachHandlers(scene);
}

backBtn.disabled=(history.length<=1);
depthNum.textContent=history.length;
}

function attachHandlers(scene){
const choices=scene.querySelectorAll('.choice');
choices.forEach(function(btn){
btn.addEventListener('click',function(){
const cid=btn.getAttribute('data-id');
history.push(cid);
renderScene(cid,'forward');
window.scrollTo({top:0,behavior:'smooth'});
});
});
}

function goBack(){
if(history.length<=1) return;
history.pop();
renderScene(history[history.length-1],'back');
window.scrollTo({top:0,behavior:'smooth'});
}

function restart(){
history=['start'];
renderScene('start','forward');
window.scrollTo({top:0,behavior:'smooth'});
}

// Keyboard shortcuts: A/B/C/D for choices, Backspace/Escape for back, R for restart.
document.addEventListener('keydown',function(e){
if(e.key==='Backspace'||e.key==='Escape'){e.preventDefault();goBack();return}
if(e.key==='r'||e.key==='R'){restart();return}
const idx='abcd'.indexOf(e.key.toLowerCase());
if(idx>=0){
const choices=stage.querySelectorAll('.choice');
if(choices[idx]) choices[idx].click();
}
});

renderScene('start','forward');
</script>
</body>
</html>
