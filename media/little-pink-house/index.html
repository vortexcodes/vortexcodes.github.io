<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Little Pink House &mdash; A Choose Your Own Adventure</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0c0c0f;--bg2:#151519;--bg3:#1c1c22;
--border:#2a2a33;--border-h:#3a3a48;
--text:#e2e0d8;--text2:#9a988e;--text3:#5e5d57;
--pink:#e8456c;--pink2:#ff6b8a;--pink-bg:rgba(232,69,108,.08);
--amber:#d4a041;--amber-bg:rgba(212,160,65,.08);
--green:#4a9;--green-bg:rgba(68,170,153,.08);
--red:#d45;--red-bg:rgba(221,68,85,.08);
--purple:#9a7bd4;--purple-bg:rgba(154,123,212,.08);
--mono:'JetBrains Mono',monospace;
--sans:'DM Sans',sans-serif;
}
html,body{height:100%}
body{
background:
radial-gradient(ellipse 80% 60% at 50% 0%,rgba(232,69,108,.08),transparent 70%),
radial-gradient(ellipse 60% 40% at 50% 100%,rgba(154,123,212,.05),transparent 70%),
var(--bg);
color:var(--text);font-family:var(--mono);
min-height:100vh;display:flex;flex-direction:column;
overflow-x:hidden;
}
.topbar{
display:flex;align-items:center;justify-content:space-between;
padding:18px 28px;border-bottom:1px solid var(--border);
position:sticky;top:0;background:rgba(12,12,15,.85);
backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:20;
}
.brand{font-family:var(--sans);font-size:14px;font-weight:700;letter-spacing:.01em}
.brand span{color:var(--pink)}
.brand .sub{display:block;font-family:var(--mono);font-size:9px;font-weight:400;color:var(--text3);letter-spacing:.15em;text-transform:uppercase;margin-top:2px}
.topbar-right{display:flex;align-items:center;gap:10px}
.pill{
font-size:10px;color:var(--text3);
background:var(--bg2);border:1px solid var(--border);
border-radius:20px;padding:6px 12px;letter-spacing:.08em;text-transform:uppercase;
}
.pill b{color:var(--text2);font-weight:600}
.back-btn{
background:var(--bg2);border:1px solid var(--border);border-radius:8px;
padding:8px 14px;font-family:var(--mono);font-size:11px;color:var(--text2);
cursor:pointer;transition:all .2s;letter-spacing:.05em;
}
.back-btn:hover:not(:disabled){border-color:var(--pink);color:var(--pink)}
.back-btn:disabled{opacity:.3;cursor:not-allowed}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px 60px}
.stage{width:100%;max-width:720px;position:relative}
.scene{
position:relative;
opacity:0;transform:translateY(12px);
transition:opacity .45s ease,transform .45s ease;
}
.scene.in{opacity:1;transform:translateY(0)}
.scene.out{opacity:0;transform:translateY(-12px);transition:opacity .25s ease,transform .25s ease}
.step-label{
font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);
margin-bottom:16px;display:flex;align-items:center;gap:10px;
}
.step-label::before{
content:'';display:inline-block;width:24px;height:1px;background:var(--pink);
}
.scene-title{
font-family:var(--sans);font-size:34px;font-weight:700;line-height:1.15;
margin-bottom:22px;letter-spacing:-.01em;
}
.scene-title .accent{color:var(--pink)}
.scene-text{
font-family:var(--sans);font-size:17px;line-height:1.65;color:var(--text2);
margin-bottom:38px;max-width:640px;
}
.choices{display:flex;flex-direction:column;gap:12px;margin-top:8px}
.choice{
display:flex;align-items:flex-start;gap:14px;text-align:left;
background:var(--bg2);border:1px solid var(--border);border-radius:12px;
padding:18px 22px;font-family:var(--mono);color:var(--text);cursor:pointer;
transition:all .25s ease;width:100%;
}
.choice:hover{
border-color:var(--pink);background:var(--pink-bg);
transform:translateX(4px);
}
.choice:hover .choice-arrow{color:var(--pink);transform:translateX(3px)}
.choice-letter{
font-size:11px;font-weight:600;letter-spacing:.12em;color:var(--text3);
background:var(--bg3);border:1px solid var(--border);border-radius:6px;
padding:4px 8px;margin-top:1px;flex-shrink:0;
}
.choice:hover .choice-letter{color:var(--pink);border-color:var(--pink)}
.choice-label{
flex:1;font-family:var(--sans);font-size:15px;font-weight:500;line-height:1.4;
}
.choice-arrow{font-size:16px;color:var(--text3);transition:all .25s;margin-top:1px}
.ending-card{
border:1px solid var(--border);border-radius:14px;padding:34px 32px;
background:var(--bg2);margin-top:10px;position:relative;overflow:hidden;
}
.ending-card::before{
content:'';position:absolute;top:0;left:0;right:0;height:3px;
background:var(--pink);
}
.ending-card.good::before{background:var(--green)}
.ending-card.good{background:linear-gradient(180deg,var(--green-bg),var(--bg2) 60%)}
.ending-card.great::before{background:var(--purple)}
.ending-card.great{background:linear-gradient(180deg,var(--purple-bg),var(--bg2) 60%)}
.ending-card.mixed::before{background:var(--amber)}
.ending-card.mixed{background:linear-gradient(180deg,var(--amber-bg),var(--bg2) 60%)}
.ending-card.bad::before{background:var(--red)}
.ending-card.bad{background:linear-gradient(180deg,var(--red-bg),var(--bg2) 60%)}
.ending-type{
font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--text3);
margin-bottom:10px;
}
.ending-card.good .ending-type{color:var(--green)}
.ending-card.great .ending-type{color:var(--purple)}
.ending-card.mixed .ending-type{color:var(--amber)}
.ending-card.bad .ending-type{color:var(--red)}
.ending-name{
font-family:var(--sans);font-size:30px;font-weight:700;line-height:1.15;
margin-bottom:18px;letter-spacing:-.01em;
}
.ending-text{
font-family:var(--sans);font-size:16px;line-height:1.65;color:var(--text2);
margin-bottom:26px;
}
.ending-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.action{
background:var(--bg3);border:1px solid var(--border);border-radius:8px;
padding:11px 20px;font-family:var(--mono);font-size:12px;color:var(--text);
cursor:pointer;transition:all .2s;letter-spacing:.05em;
}
.action:hover{border-color:var(--pink);color:var(--pink)}
.action.primary{background:var(--pink);border-color:var(--pink);color:#0c0c0f;font-weight:600}
.action.primary:hover{background:var(--pink2);border-color:var(--pink2);color:#0c0c0f}
.path-trail{
margin-top:48px;padding-top:22px;border-top:1px dashed var(--border);
font-size:10px;color:var(--text3);letter-spacing:.05em;line-height:1.7;
}
.path-trail b{color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.15em;font-size:9px;display:block;margin-bottom:8px}
.path-trail .crumb{display:inline-block;margin-right:6px}
.path-trail .crumb + .crumb::before{content:'\203A';margin-right:6px;color:var(--text3)}
.legend-bar{
display:flex;justify-content:center;gap:18px;padding:14px 24px;
border-top:1px solid var(--border);background:var(--bg2);flex-wrap:wrap;
}
.legend-item{display:flex;align-items:center;gap:6px;font-size:9px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase}
.legend-dot{width:8px;height:8px;border-radius:2px}
@media (max-width:640px){
.topbar{padding:14px 18px}
.brand{font-size:12px}
.scene-title{font-size:26px}
.scene-text{font-size:15px}
.ending-name{font-size:24px}
.ending-card{padding:26px 22px}
.choice{padding:16px 18px}
.choice-label{font-size:14px}
main{padding:28px 18px 40px}
.legend-bar{gap:10px;padding:12px 14px}
}
</style>
</head>
<body>
<div class="topbar">
<div class="brand">The Little <span>Pink</span> House<span class="sub">Choose Your Own Adventure</span></div>
<div class="topbar-right">
<div class="pill" id="progressPill">Scene <b id="depthNum">1</b></div>
<button class="back-btn" id="backBtn" onclick="goBack()">&larr; Back</button>
</div>
</div>
<main>
<div class="stage" id="stage"></div>
</main>
<div class="legend-bar">
<div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div>Great ending</div>
<div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Good ending</div>
<div class="legend-item"><div class="legend-dot" style="background:var(--amber)"></div>Mixed ending</div>
<div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>Bad ending</div>
<div class="legend-item" style="color:var(--text2)">16 possible endings</div>
</div>
<script>
const tree={
id:'start',step:'Scene 1',title:'Eminent domain notice arrives',
text:'The government plans to seize your little pink house for a private development project. What do you do?',
children:[
{id:'negotiate',step:'Choice A',title:'Negotiate alone',
text:'You try to reason with the government agents yourself, hoping they\'ll raise the offer. They barely budge.',
children:[
{id:'accept',step:'Choice A',title:'Accept the low offer',
ending:{type:'bad',name:'Underpaid',text:'You sign away your home for a fraction of its real value. Within months, bulldozers flatten the little pink house. The developer breaks ground on luxury condos where your kitchen used to be.'}},
{id:'fight_solo',step:'Choice B',title:'Refuse \u2014 fight back alone',
text:'No lawyer, no money, but you refuse to give up. You need the public on your side.',
children:[
{id:'media_solo',step:'Choice A',title:'Take your story to the media',
text:'A local reporter runs your story. The neighborhood starts paying attention. Momentum builds.',
children:[
{id:'rally',step:'Choice A',title:'Rally neighbors to fight the blight hearing',
text:'You pack the hearing room with supporters and photos of well-maintained homes. The council votes anyway.',
children:[
{id:'blight_win',step:'Choice A',title:'Challenge the designation in court',
ending:{type:'good',name:'Home saved',text:'Your attorney challenges the blight finding and wins. Without "blight," the city can\'t justify the taking. The little pink house stands. You sit on your porch and watch the sunset, same as always.'}},
{id:'blight_lose',step:'Choice B',title:'Lose the challenge \u2014 condemnation proceeds',
text:'The court upholds the blight finding. Your home will be taken. The only question left is how much they pay you.',
children:[
{id:'settle1',step:'Choice A',title:'Accept the commissioners\' award',
ending:{type:'mixed',name:'The pragmatist',text:'You take the money and walk away. It\'s more than the first offer, but less than your home is worth. You find a new place, start over. The little pink house becomes a parking garage.'}},
{id:'jury1',step:'Choice B',title:'Demand a jury trial',
ending:{type:'good',name:'The fighter',text:'The jury awards you 4x the government\'s initial offer. You lost the house, but you won the fight for fair compensation. Your story runs in the national papers.'}}
]}
]},
{id:'referendum',step:'Choice B',title:'Push for a ballot referendum instead',
ending:{type:'mixed',name:'The reformer',text:'Your petition gets enough signatures. The referendum passes \u2014 but too late to save your home. Future homeowners in your state are protected by the new law you helped create. The pink house is gone, but its legacy lives on.'}}
]},
{id:'retaliate',step:'Choice B',title:'City retaliates \u2014 fast-tracks your case',
text:'Without a lawyer, the city accelerates the condemnation timeline. You\'re being steamrolled.',
children:[
{id:'cave',step:'Choice A',title:'Give up under pressure',
ending:{type:'bad',name:'Pressured out',text:'The legal threats, the deadlines, the isolation \u2014 it breaks you. You sign under duress for barely more than the original offer. You watch them demolish your home from across the street.'}},
{id:'probono',step:'Choice B',title:'A pro-bono lawyer takes your case',
text:'A civil liberties attorney sees your story and offers to represent you for free. Finally, a fair fight \u2014 but the taking is already approved.',
children:[
{id:'settle2',step:'Choice A',title:'Settle for the revised offer',
ending:{type:'mixed',name:'The pragmatist',text:'Your lawyer negotiates a better settlement. You take the money and move on. It\'s not what the home was worth to you \u2014 but what is?'}},
{id:'jury2',step:'Choice B',title:'Push for a jury trial',
ending:{type:'good',name:'The fighter',text:'The jury sees through the city\'s low-ball tactics and awards you far more than the commissioners\' figure. You leave with your head high and enough to start fresh.'}}
]}
]}
]}
]},
{id:'attorney',step:'Choice B',title:'Hire an eminent domain attorney',
text:'Your attorney files a FOIA request and uncovers the private developer deal. Now you have real ammunition.',
children:[
{id:'coalition',step:'Choice A',title:'Build a coalition + media blitz',
text:'Door-to-door organizing, protests, Op-Eds. You turn your fight into a political headache for City Hall.',
children:[
{id:'court_challenge',step:'Choice A',title:'Challenge the lawsuit in court',
text:'Your attorney argues the city failed to follow proper procedures and your property isn\'t necessary for the project.',
children:[
{id:'court_win',step:'Choice A',title:'Win on procedural grounds',
ending:{type:'good',name:'Victory \u2014 case dismissed',text:'The court finds the city cut corners: improper notice, missing environmental studies, predetermined outcomes. The condemnation is thrown out. Your little pink house stands. The developers have to go back to the drawing board.'}},
{id:'court_lose',step:'Choice B',title:'Judge defers to the city',
text:'The judge upholds the taking but moves to valuation. Your coalition pressure means the commissioners can\'t lowball you easily.',
children:[
{id:'settle3',step:'Choice A',title:'Accept the commissioners\' award',
ending:{type:'mixed',name:'The pragmatist',text:'The coalition pressure got you a better award than most. You take the money, donate some to the neighborhood action group, and find a new home. The fight continues without you.'}},
{id:'jury3',step:'Choice B',title:'Demand a jury trial',
ending:{type:'good',name:'The fighter',text:'Your coalition fills the courtroom gallery. The jury awards you 5x the initial offer \u2014 the largest eminent domain verdict in the state\'s history. National news covers the story.'}}
]}
]},
{id:'ij',step:'Choice B',title:'Get the Institute for Justice involved',
text:'The national property rights organization takes your case. They see it as a test case for eminent domain reform.',
children:[
{id:'landmark',step:'Choice A',title:'Win the landmark case',
ending:{type:'great',name:'Landmark victory',text:'The state supreme court rules the taking unconstitutional \u2014 private development is not "public use." Your case becomes a textbook example. The little pink house becomes a symbol of property rights. Law students study your case for decades.'}},
{id:'movement',step:'Choice B',title:'Lose \u2014 but the nation watches',
ending:{type:'mixed',name:'The movement',text:'You lose the case, but the Institute publicizes it nationwide. 43 states pass eminent domain reform laws. Your little pink house is gone, but the movement it created protects millions of homeowners. Sometimes you lose the battle but win the war.'}}
]}
]},
{id:'direct_court',step:'Choice B',title:'Skip the politics \u2014 go straight to court',
text:'Your attorney uses the FOIA evidence to challenge whether this is really a "public use" or just a giveaway to a private developer.',
children:[
{id:'pu_win',step:'Choice A',title:'"Public use" challenge succeeds',
ending:{type:'great',name:'Taking blocked',text:'The court agrees: handing private land to another private party for condos isn\'t "public use." The taking is blocked. Your home is safe. The developer\'s lawyers appeal, but the ruling holds. You plant new flowers in front of your little pink house.'}},
{id:'pu_lose',step:'Choice B',title:'Court upholds broad "public use"',
text:'The court says increased tax revenue counts as "public benefit." The taking stands. Only the price is left to fight over.',
children:[
{id:'settle4',step:'Choice A',title:'Settle and move on',
ending:{type:'mixed',name:'The pragmatist',text:'Your attorney negotiates the best deal possible. You take the check and buy a place in the next town over. It\'s not the same. On quiet evenings you drive past where the pink house used to be.'}},
{id:'jury4',step:'Choice B',title:'Take it to a jury',
ending:{type:'good',name:'The fighter',text:'Your attorney presents the FOIA evidence showing the sweetheart developer deal. The jury is furious. They award you massive compensation \u2014 a reckoning for the city\'s greed. You lost your home, but you made them pay for it.'}}
]}
]}
]}
]};

// Build a flat lookup from id -> node (with parent reference) for back navigation and path display.
const nodes={};
(function walk(node,parent){
node.parent=parent||null;
nodes[node.id]=node;
if(node.children) node.children.forEach(function(c){walk(c,node)});
})(tree);

let history=['start'];
const stage=document.getElementById('stage');
const backBtn=document.getElementById('backBtn');
const depthNum=document.getElementById('depthNum');

function escapeHtml(s){
return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlightTitle(t){
// Wrap "Pink" in accent span if present (only on start scene title)
return escapeHtml(t).replace(/Pink/g,'<span class="accent">Pink</span>');
}

function renderScene(id,direction){
const node=nodes[id];
const prev=stage.querySelector('.scene');
const scene=document.createElement('div');
scene.className='scene';
let html='';
const isStart=(id==='start');
const stepText=isStart?'Scene 01 \u2014 The beginning':node.step;
html+='<div class="step-label">'+escapeHtml(stepText)+'</div>';

if(node.ending){
const e=node.ending;
html+='<div class="ending-card '+e.type+'">';
html+='<div class="ending-type">'+({good:'Good ending',great:'Great ending',mixed:'Mixed ending',bad:'Bad ending'})[e.type]+'</div>';
html+='<div class="ending-name">'+escapeHtml(e.name)+'</div>';
html+='<div class="ending-text">'+escapeHtml(e.text)+'</div>';
html+='<div class="ending-actions">';
html+='<button class="action primary" onclick="restart()">&#x21BB; Start over</button>';
html+='<button class="action" onclick="goBack()">&larr; Try a different choice</button>';
html+='</div>';
html+='</div>';
}else{
html+='<div class="scene-title">'+highlightTitle(node.title)+'</div>';
if(node.text) html+='<div class="scene-text">'+escapeHtml(node.text)+'</div>';
if(node.children&&node.children.length){
html+='<div class="choices">';
node.children.forEach(function(c,i){
const letter=String.fromCharCode(65+i);
html+='<button class="choice" data-id="'+c.id+'">';
html+='<div class="choice-letter">'+letter+'</div>';
html+='<div class="choice-label">'+escapeHtml(c.title)+'</div>';
html+='<div class="choice-arrow">&rarr;</div>';
html+='</button>';
});
html+='</div>';
}
}

// Path trail (breadcrumb of choices made so far)
if(history.length>1){
html+='<div class="path-trail"><b>Your path so far</b>';
history.forEach(function(hid,i){
if(i===0) return;
const hn=nodes[hid];
html+='<span class="crumb">'+escapeHtml(hn.title)+'</span>';
});
html+='</div>';
}

scene.innerHTML=html;

if(prev){
prev.classList.remove('in');
prev.classList.add('out');
setTimeout(function(){
if(prev.parentNode) prev.parentNode.removeChild(prev);
stage.appendChild(scene);
requestAnimationFrame(function(){scene.classList.add('in')});
attachHandlers(scene);
},250);
}else{
stage.appendChild(scene);
requestAnimationFrame(function(){scene.classList.add('in')});
attachHandlers(scene);
}

backBtn.disabled=(history.length<=1);
depthNum.textContent=history.length;
}

function attachHandlers(scene){
const choices=scene.querySelectorAll('.choice');
choices.forEach(function(btn){
btn.addEventListener('click',function(){
const cid=btn.getAttribute('data-id');
history.push(cid);
renderScene(cid,'forward');
window.scrollTo({top:0,behavior:'smooth'});
});
});
}

function goBack(){
if(history.length<=1) return;
history.pop();
renderScene(history[history.length-1],'back');
window.scrollTo({top:0,behavior:'smooth'});
}

function restart(){
history=['start'];
renderScene('start','forward');
window.scrollTo({top:0,behavior:'smooth'});
}

// Keyboard shortcuts: A/B/C/D for choices, Backspace/Escape for back, R for restart.
document.addEventListener('keydown',function(e){
if(e.key==='Backspace'||e.key==='Escape'){e.preventDefault();goBack();return}
if(e.key==='r'||e.key==='R'){restart();return}
const idx='abcd'.indexOf(e.key.toLowerCase());
if(idx>=0){
const choices=stage.querySelectorAll('.choice');
if(choices[idx]) choices[idx].click();
}
});

renderScene('start','forward');
</script>
</body>
</html>
