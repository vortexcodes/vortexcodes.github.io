<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Little Pink House — Branching Flowchart</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0c0c0f;--bg2:#151519;--bg3:#1c1c22;
--border:#2a2a33;--border-h:#3a3a48;
--text:#e2e0d8;--text2:#9a988e;--text3:#5e5d57;
--pink:#e8456c;--pink2:#ff6b8a;--pink-bg:rgba(232,69,108,.1);
--amber:#d4a041;--amber-bg:rgba(212,160,65,.1);
--green:#4a9;--green-bg:rgba(68,170,153,.1);
--red:#d45;--red-bg:rgba(221,68,85,.1);
--blue:#4a90d9;--blue-bg:rgba(74,144,217,.1);
--purple:#9a7bd4;--purple-bg:rgba(154,123,212,.1);
--mono:'JetBrains Mono',monospace;
--sans:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--mono)}
.header{text-align:center;padding:36px 24px 24px;position:relative}
.header::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:120px;height:1px;background:linear-gradient(90deg,transparent,var(--pink),transparent)}
.header h1{font-size:24px;font-weight:700;font-family:var(--sans);margin-bottom:4px}
.header h1 span{color:var(--pink)}
.header .sub{font-size:11px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.header .inst{font-size:11px;color:var(--text3);max-width:460px;margin:6px auto 0;line-height:1.5}
.legend{display:flex;justify-content:center;gap:14px;padding:16px 24px 8px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text3)}
.legend-dot{width:8px;height:8px;border-radius:3px}
.canvas-wrap{overflow:auto;padding:16px 24px 80px;-webkit-overflow-scrolling:touch}
.canvas{position:relative;margin:0 auto}
svg.lines{position:absolute;top:0;left:0;pointer-events:none}
svg.lines path{fill:none;stroke-width:1.5;transition:stroke .5s,opacity .5s}
.node{position:absolute;border-radius:10px;background:var(--bg2);transition:all .4s;cursor:default;overflow:hidden}
.node.ghost{opacity:.06;transform:scale(.92);pointer-events:none}
.node.available{opacity:1;transform:scale(1);cursor:pointer;border:1px solid var(--border)}
.node.available:hover{border-color:var(--pink);background:var(--pink-bg);transform:scale(1.03)}
.node.active{opacity:1;transform:scale(1);border:1px solid var(--pink);box-shadow:0 0 24px rgba(232,69,108,.1)}
.node.chosen{opacity:1;transform:scale(1);border:1px solid var(--pink);background:var(--pink-bg)}
.node.completed{opacity:.55;transform:scale(1);border:1px solid var(--border-h)}
.node.dimmed{opacity:.08;transform:scale(.9);pointer-events:none}
.node-inner{padding:12px 14px;overflow-y:auto;max-height:100%}
.node-inner::-webkit-scrollbar{width:4px}
.node-inner::-webkit-scrollbar-track{background:transparent}
.node-inner::-webkit-scrollbar-thumb{background:var(--border-h);border-radius:2px}
.node-inner::-webkit-scrollbar-thumb:hover{background:var(--pink)}
.node-step{font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:3px}
.node.active .node-step,.node.chosen .node-step{color:var(--pink)}
.node-title{font-size:12px;font-weight:600;font-family:var(--sans);line-height:1.3;margin-bottom:4px}
.node-text{font-size:10px;line-height:1.5;color:var(--text2)}
.node-arrow{position:absolute;bottom:6px;right:10px;font-size:10px;color:var(--pink);opacity:0;transition:opacity .2s}
.node.available .node-arrow{opacity:.6}
.node.available:hover .node-arrow{opacity:1}
.node.ending{border-width:2px}
.node.ending .node-title{font-size:11px}
.node.ending.end-good{border-color:var(--green)}
.node.ending.end-good .node-step{color:var(--green)}
.node.ending.end-good.active,.node.ending.end-good.chosen{background:var(--green-bg);box-shadow:0 0 24px rgba(68,170,153,.12)}
.node.ending.end-mixed{border-color:var(--amber)}
.node.ending.end-mixed .node-step{color:var(--amber)}
.node.ending.end-mixed.active,.node.ending.end-mixed.chosen{background:var(--amber-bg);box-shadow:0 0 24px rgba(212,160,65,.12)}
.node.ending.end-bad{border-color:var(--red)}
.node.ending.end-bad .node-step{color:var(--red)}
.node.ending.end-bad.active,.node.ending.end-bad.chosen{background:var(--red-bg);box-shadow:0 0 24px rgba(221,68,85,.12)}
.node.ending.end-great{border-color:var(--purple)}
.node.ending.end-great .node-step{color:var(--purple)}
.node.ending.end-great.active,.node.ending.end-great.chosen{background:var(--purple-bg);box-shadow:0 0 24px rgba(154,123,212,.12)}
.restart-float{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 24px;font-family:var(--mono);font-size:12px;color:var(--text);cursor:pointer;transition:all .2s;z-index:10;display:none}
.restart-float:hover{border-color:var(--pink);color:var(--pink)}
.restart-float.show{display:block}
.path-count{position:fixed;top:16px;right:20px;font-size:10px;color:var(--text3);z-index:10;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:6px 12px;display:none}
.path-count.show{display:block}
</style>
</head>
<body>
<div class="header">
<h1>The Little <span>Pink</span> House</h1>
<div class="sub">Fighting eminent domain &mdash; a choose your own adventure</div>
<div class="inst">Click choices to branch through the story. Every path leads to a different outcome. 8 possible endings.</div>
</div>
<div class="legend">
<div class="legend-item"><div class="legend-dot" style="background:var(--pink)"></div>Your path</div>
<div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Good ending</div>
<div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div>Great ending</div>
<div class="legend-item"><div class="legend-dot" style="background:var(--amber)"></div>Mixed ending</div>
<div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>Bad ending</div>
</div>
<div class="canvas-wrap" id="canvasWrap">
<div class="canvas" id="canvas">
<svg class="lines" id="svg"></svg>
</div>
</div>
<button class="restart-float" id="restartBtn" onclick="restart()">&#x21BB; Start over</button>
<div class="path-count" id="pathCount"></div>
<script>
const NODE_W=175,GAP_X=14,LEVEL_H=200,PAD=40;
const tree={
id:'start',step:'Start',title:'Eminent domain notice arrives',
text:'The government plans to seize your little pink house for a private development project. What do you do?',
children:[
{id:'negotiate',step:'Choice A',title:'Negotiate alone',
text:'You try to reason with the government agents yourself, hoping they\'ll raise the offer. They barely budge.',
children:[
{id:'accept',step:'Choice A',title:'Accept the low offer',
ending:{type:'bad',name:'Underpaid',text:'You sign away your home for a fraction of its real value. Within months, bulldozers flatten the little pink house. The developer breaks ground on luxury condos where your kitchen used to be.'}},
{id:'fight_solo',step:'Choice B',title:'Refuse \u2014 fight back alone',
text:'No lawyer, no money, but you refuse to give up. You need the public on your side.',
children:[
{id:'media_solo',step:'Choice A',title:'Take your story to the media',
text:'A local reporter runs your story. The neighborhood starts paying attention. Momentum builds.',
children:[
{id:'rally',step:'Choice A',title:'Rally neighbors to fight the blight hearing',
text:'You pack the hearing room with supporters and photos of well-maintained homes. The council votes anyway.',
children:[
{id:'blight_win',step:'Choice A',title:'Challenge the designation in court',
ending:{type:'good',name:'Home saved',text:'Your attorney challenges the blight finding and wins. Without "blight," the city can\'t justify the taking. The little pink house stands. You sit on your porch and watch the sunset, same as always.'}},
{id:'blight_lose',step:'Choice B',title:'Lose the challenge \u2014 condemnation proceeds',
text:'The court upholds the blight finding. Your home will be taken. The only question left is how much they pay you.',
children:[
{id:'settle1',step:'Choice A',title:'Accept the commissioners\' award',
ending:{type:'mixed',name:'The pragmatist',text:'You take the money and walk away. It\'s more than the first offer, but less than your home is worth. You find a new place, start over. The little pink house becomes a parking garage.'}},
{id:'jury1',step:'Choice B',title:'Demand a jury trial',
ending:{type:'good',name:'The fighter',text:'The jury awards you 4x the government\'s initial offer. You lost the house, but you won the fight for fair compensation. Your story runs in the national papers.'}}
]}
]},
{id:'referendum',step:'Choice B',title:'Push for a ballot referendum instead',
ending:{type:'mixed',name:'The reformer',text:'Your petition gets enough signatures. The referendum passes \u2014 but too late to save your home. Future homeowners in your state are protected by the new law you helped create. The pink house is gone, but its legacy lives on.'}}
]},
{id:'retaliate',step:'Choice B',title:'City retaliates \u2014 fast-tracks your case',
text:'Without a lawyer, the city accelerates the condemnation timeline. You\'re being steamrolled.',
children:[
{id:'cave',step:'Choice A',title:'Give up under pressure',
ending:{type:'bad',name:'Pressured out',text:'The legal threats, the deadlines, the isolation \u2014 it breaks you. You sign under duress for barely more than the original offer. You watch them demolish your home from across the street.'}},
{id:'probono',step:'Choice B',title:'A pro-bono lawyer takes your case',
text:'A civil liberties attorney sees your story and offers to represent you for free. Finally, a fair fight \u2014 but the taking is already approved.',
children:[
{id:'settle2',step:'Choice A',title:'Settle for the revised offer',
ending:{type:'mixed',name:'The pragmatist',text:'Your lawyer negotiates a better settlement. You take the money and move on. It\'s not what the home was worth to you \u2014 but what is?'}},
{id:'jury2',step:'Choice B',title:'Push for a jury trial',
ending:{type:'good',name:'The fighter',text:'The jury sees through the city\'s low-ball tactics and awards you far more than the commissioners\' figure. You leave with your head high and enough to start fresh.'}}
]}
]}
]}
]},
{id:'attorney',step:'Choice B',title:'Hire an eminent domain attorney',
text:'Your attorney files a FOIA request and uncovers the private developer deal. Now you have real ammunition.',
children:[
{id:'coalition',step:'Choice A',title:'Build a coalition + media blitz',
text:'Door-to-door organizing, protests, Op-Eds. You turn your fight into a political headache for City Hall.',
children:[
{id:'court_challenge',step:'Choice A',title:'Challenge the lawsuit in court',
text:'Your attorney argues the city failed to follow proper procedures and your property isn\'t necessary for the project.',
children:[
{id:'court_win',step:'Choice A',title:'Win on procedural grounds',
ending:{type:'good',name:'Victory \u2014 case dismissed',text:'The court finds the city cut corners: improper notice, missing environmental studies, predetermined outcomes. The condemnation is thrown out. Your little pink house stands. The developers have to go back to the drawing board.'}},
{id:'court_lose',step:'Choice B',title:'Judge defers to the city',
text:'The judge upholds the taking but moves to valuation. Your coalition pressure means the commissioners can\'t lowball you easily.',
children:[
{id:'settle3',step:'Choice A',title:'Accept the commissioners\' award',
ending:{type:'mixed',name:'The pragmatist',text:'The coalition pressure got you a better award than most. You take the money, donate some to the neighborhood action group, and find a new home. The fight continues without you.'}},
{id:'jury3',step:'Choice B',title:'Demand a jury trial',
ending:{type:'good',name:'The fighter',text:'Your coalition fills the courtroom gallery. The jury awards you 5x the initial offer \u2014 the largest eminent domain verdict in the state\'s history. National news covers the story.'}}
]}
]},
{id:'ij',step:'Choice B',title:'Get the Institute for Justice involved',
text:'The national property rights organization takes your case. They see it as a test case for eminent domain reform.',
children:[
{id:'landmark',step:'Choice A',title:'Win the landmark case',
ending:{type:'great',name:'Landmark victory',text:'The state supreme court rules the taking unconstitutional \u2014 private development is not "public use." Your case becomes a textbook example. The little pink house becomes a symbol of property rights. Law students study your case for decades.'}},
{id:'movement',step:'Choice B',title:'Lose \u2014 but the nation watches',
ending:{type:'mixed',name:'The movement',text:'You lose the case, but the Institute publicizes it nationwide. 43 states pass eminent domain reform laws. Your little pink house is gone, but the movement it created protects millions of homeowners. Sometimes you lose the battle but win the war.'}}
]}
]},
{id:'direct_court',step:'Choice B',title:'Skip the politics \u2014 go straight to court',
text:'Your attorney uses the FOIA evidence to challenge whether this is really a "public use" or just a giveaway to a private developer.',
children:[
{id:'pu_win',step:'Choice A',title:'"Public use" challenge succeeds',
ending:{type:'great',name:'Taking blocked',text:'The court agrees: handing private land to another private party for condos isn\'t "public use." The taking is blocked. Your home is safe. The developer\'s lawyers appeal, but the ruling holds. You plant new flowers in front of your little pink house.'}},
{id:'pu_lose',step:'Choice B',title:'Court upholds broad "public use"',
text:'The court says increased tax revenue counts as "public benefit." The taking stands. Only the price is left to fight over.',
children:[
{id:'settle4',step:'Choice A',title:'Settle and move on',
ending:{type:'mixed',name:'The pragmatist',text:'Your attorney negotiates the best deal possible. You take the check and buy a place in the next town over. It\'s not the same. On quiet evenings you drive past where the pink house used to be.'}},
{id:'jury4',step:'Choice B',title:'Take it to a jury',
ending:{type:'good',name:'The fighter',text:'Your attorney presents the FOIA evidence showing the sweetheart developer deal. The jury is furious. They award you massive compensation \u2014 a reckoning for the city\'s greed. You lost your home, but you made them pay for it.'}}
]}
]}
]}
]};
let flat=[];
let lines=[];
let state={};
function flattenTree(node,parent,depth){
parent=parent||null;depth=depth||0;
const n={id:node.id,step:node.step,title:node.title,text:node.text||'',ending:node.ending||null,parentId:parent?parent.id:null,childIds:node.children?node.children.map(function(c){return c.id}):[],depth:depth,x:0,y:0,subtreeWidth:0};
flat.push(n);
if(node.children) node.children.forEach(function(c){flattenTree(c,node,depth+1)});
}
function computeWidths(){
var byDepth=[].concat(flat).sort(function(a,b){return b.depth-a.depth});
byDepth.forEach(function(n){
if(n.childIds.length===0){n.subtreeWidth=NODE_W}
else{
var kids=n.childIds.map(function(id){return flat.find(function(f){return f.id===id})});
n.subtreeWidth=kids.reduce(function(s,k){return s+k.subtreeWidth},0)+(kids.length-1)*GAP_X;
}
});
}
function positionNodes(id,cx,y){
var n=flat.find(function(f){return f.id===id});
n.x=cx-NODE_W/2;
n.y=y;
n.cx=cx;
if(n.childIds.length===0) return;
var kids=n.childIds.map(function(cid){return flat.find(function(f){return f.id===cid})});
var left=cx-n.subtreeWidth/2;
kids.forEach(function(k){
var kcx=left+k.subtreeWidth/2;
positionNodes(k.id,kcx,y+LEVEL_H);
left+=k.subtreeWidth+GAP_X;
});
}
function getNodeHeight(n){
if(n.ending) return 180;
if(n.childIds.length===0) return 65;
return n.text.length>100?100:85;
}
function render(){
flat=[];lines=[];
flattenTree(tree);
computeWidths();
var root=flat.find(function(f){return f.id==='start'});
var totalW=root.subtreeWidth+PAD*2;
var cx=totalW/2;
positionNodes('start',cx,PAD);
var maxBottom=Math.max.apply(null,flat.map(function(n){return n.y+getNodeHeight(n)}))+PAD;
var canvas=document.getElementById('canvas');
var svg=document.getElementById('svg');
canvas.style.width=totalW+'px';
canvas.style.height=maxBottom+'px';
svg.setAttribute('width',totalW);
svg.setAttribute('height',maxBottom);
svg.innerHTML='';
flat.forEach(function(n){
if(!n.parentId) return;
var p=flat.find(function(f){return f.id===n.parentId});
var x1=p.cx,y1=p.y+getNodeHeight(p);
var x2=n.cx,y2=n.y;
var midY=y1+(y2-y1)*.5;
var path=document.createElementNS('http://www.w3.org/2000/svg','path');
path.setAttribute('d','M'+x1+','+y1+' C'+x1+','+midY+' '+x2+','+midY+' '+x2+','+y2);
path.id='line-'+n.id;
path.setAttribute('stroke','#2a2a33');
path.setAttribute('opacity','0.15');
svg.appendChild(path);
lines.push({parentId:n.parentId,childId:n.id,el:path});
});
var existing=canvas.querySelectorAll('.node');
existing.forEach(function(e){e.remove()});
flat.forEach(function(n){
var el=document.createElement('div');
var h=getNodeHeight(n);
var cls='node ghost';
if(n.ending){
var etype=n.ending.type;
cls+=' ending end-'+etype;
}
el.className=cls;
el.id='node-'+n.id;
el.style.left=n.x+'px';
el.style.top=n.y+'px';
el.style.width=NODE_W+'px';
el.style.height=h+'px';
var inner='<div class="node-inner">';
inner+='<div class="node-step">'+(n.ending?n.ending.name:n.step)+'</div>';
inner+='<div class="node-title">'+n.title+'</div>';
if(n.ending){
inner+='<div class="node-text">'+n.ending.text+'</div>';
}else if(n.text){
inner+='<div class="node-text">'+n.text+'</div>';
}
inner+='</div>';
inner+='<div class="node-arrow">\u2192</div>';
el.innerHTML=inner;
el.onclick=function(){clickNode(n.id)};
canvas.appendChild(el);
});
state={};
flat.forEach(function(n){state[n.id]='ghost'});
state['start']='active';
applyState();
showChildren('start');
}
function showChildren(id){
var n=flat.find(function(f){return f.id===id});
n.childIds.forEach(function(cid){
if(state[cid]==='ghost'){
state[cid]='available';
var line=lines.find(function(l){return l.childId===cid});
if(line){line.el.setAttribute('stroke','#3a3a48');line.el.setAttribute('opacity','0.5')}
}
});
applyState();
}
function clickNode(id){
var n=flat.find(function(f){return f.id===id});
if(state[id]==='available'){
state[id]='chosen';
if(n.parentId){
state[n.parentId]='completed';
var parent=flat.find(function(f){return f.id===n.parentId});
parent.childIds.forEach(function(sib){
if(sib!==id){
dimSubtree(sib);
var sibLine=lines.find(function(l){return l.childId===sib});
if(sibLine){sibLine.el.setAttribute('stroke','#2a2a33');sibLine.el.setAttribute('opacity','0.06')}
}
});
}
var myLine=lines.find(function(l){return l.childId===id});
if(myLine){myLine.el.setAttribute('stroke','#e8456c');myLine.el.setAttribute('opacity','1')}
applyState();
if(n.ending){
state[id]='active';
applyState();
document.getElementById('restartBtn').classList.add('show');
var pc=document.getElementById('pathCount');
pc.classList.add('show');
var depth=getDepth(id);
pc.textContent=depth+' choices made';
scrollToNode(id);
return;
}
setTimeout(function(){
state[id]='active';
showChildren(id);
applyState();
scrollToNode(n.childIds[0]);
},200);
}
}
function dimSubtree(id){
state[id]='dimmed';
var n=flat.find(function(f){return f.id===id});
n.childIds.forEach(function(cid){
dimSubtree(cid);
var line=lines.find(function(l){return l.childId===cid});
if(line){line.el.setAttribute('stroke','#2a2a33');line.el.setAttribute('opacity','0.03')}
});
}
function getDepth(id){
var d=0,n=flat.find(function(f){return f.id===id});
while(n.parentId){d++;n=flat.find(function(f){return f.id===n.parentId})}
return d;
}
function applyState(){
flat.forEach(function(n){
var el=document.getElementById('node-'+n.id);
el.className=el.className.replace(/\b(ghost|available|active|chosen|completed|dimmed)\b/g,'').trim();
el.classList.add(state[n.id]);
});
}
function scrollToNode(id){
var el=document.getElementById('node-'+id);
if(el){
var wrap=document.getElementById('canvasWrap');
var rect=el.getBoundingClientRect();
var wrapRect=wrap.getBoundingClientRect();
var targetY=wrap.scrollTop+rect.top-wrapRect.top-window.innerHeight/3;
window.scrollTo({top:targetY+wrapRect.top+window.scrollY-window.innerHeight/3,behavior:'smooth'});
var nodeCenterX=el.offsetLeft+NODE_W/2;
var scrollLeft=nodeCenterX-wrap.clientWidth/2;
wrap.scrollTo({left:scrollLeft,behavior:'smooth'});
}
}
function restart(){
document.getElementById('restartBtn').classList.remove('show');
document.getElementById('pathCount').classList.remove('show');
render();
window.scrollTo({top:0,behavior:'smooth'});
document.getElementById('canvasWrap').scrollTo({left:0,behavior:'smooth'});
}
render();
setTimeout(function(){
var wrap=document.getElementById('canvasWrap');
var startEl=document.getElementById('node-start');
if(startEl&&wrap){
var nodeCenterX=startEl.offsetLeft+NODE_W/2;
wrap.scrollLeft=nodeCenterX-wrap.clientWidth/2;
}
},100);
</script>
</body>
</html>
